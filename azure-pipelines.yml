trigger: none

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  terraformVersion: '1.9.8'

steps:
  - checkout: self
    displayName: Checkout repository

  - script: |
      set -euo pipefail
      INSTALL_DIR="$HOME/.local/bin"
      mkdir -p "$INSTALL_DIR"
      curl -fsSL "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip" -o terraform.zip
      unzip -o terraform.zip -d "$INSTALL_DIR"
      rm terraform.zip
      echo "##vso[task.prependpath]$INSTALL_DIR"
      "$INSTALL_DIR/terraform" version
    displayName: Install Terraform $(terraformVersion)
    env:
      TF_VERSION: $(terraformVersion)

  - script: terraform init -upgrade -input=false -no-color
    displayName: terraform init -upgrade
    workingDirectory: $(Build.SourcesDirectory)

  - script: terraform plan -input=false -no-color
    displayName: terraform plan
    workingDirectory: $(Build.SourcesDirectory)
