trigger: none

pr:
  branches:
    include:
      - main

pool:
  vmImage: windows-latest

steps:
  - checkout: self
    displayName: Checkout repository

  - pwsh: |
      $ErrorActionPreference = 'Stop'
      $meta = Invoke-RestMethod -Uri 'https://api.releases.hashicorp.com/v1/releases/terraform/latest'
      $version = $meta.version
      Write-Host "Latest Terraform version: $version"
      $installDir = Join-Path $env:USERPROFILE 'terraform'
      New-Item -ItemType Directory -Force -Path $installDir | Out-Null
      $zip = Join-Path $env:TEMP 'terraform.zip'
      Invoke-WebRequest -Uri "https://releases.hashicorp.com/terraform/$version/terraform_${version}_windows_amd64.zip" -OutFile $zip
      Expand-Archive -Path $zip -DestinationPath $installDir -Force
      Remove-Item $zip
      Write-Host "##vso[task.prependpath]$installDir"
      & (Join-Path $installDir 'terraform.exe') version
    displayName: Install Terraform (latest)

  - pwsh: terraform init -upgrade -input=false -no-color
    displayName: terraform init -upgrade
    workingDirectory: $(Build.SourcesDirectory)

  - pwsh: terraform plan -input=false -no-color
    displayName: terraform plan
    workingDirectory: $(Build.SourcesDirectory)
